name: Deploy (Fly.io)

# Auto-deploy on push is DISABLED for now — deploys are done manually with
# `flyctl deploy` (see .cursor/skills/dm-capital-deploy). Re-enable by
# uncommenting the `push` trigger below. The workflow still runs on demand
# from the Actions tab via workflow_dispatch.
on:
  # push:
  #   branches: [master]
  workflow_dispatch:

concurrency:
  group: deploy-backend
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: flyctl deploy --remote-only
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: flyctl deploy --remote-only --wait-timeout 300
