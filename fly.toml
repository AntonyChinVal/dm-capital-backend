# Fly.io configuration for the QOP Terminal backend.
# Edit `app` to match the slug you create with `flyctl apps create`.
# Edit `primary_region` to the region closest to you (https://fly.io/docs/reference/regions/).

app = "qop-terminal"
primary_region = "scl"        # Santiago de Chile — change as needed

[build]

[env]
  NODE_ENV     = "production"
  HOST         = "0.0.0.0"
  PORT         = "4000"
  DATABASE_URL = "file:/data/qop.db"

# Persistent volume for the SQLite database.
# Create it once with:
#   flyctl volumes create qop_data --region scl --size 1 --app qop-terminal
[[mounts]]
  source      = "qop_data"
  destination = "/data"

[http_service]
  internal_port       = 4000
  force_https         = true
  # Keep the machine running 24/7 — the WS to Deribit must stay open.
  auto_stop_machines  = "off"
  auto_start_machines = false
  min_machines_running = 1

  [[http_service.checks]]
    interval     = "30s"
    timeout      = "5s"
    grace_period = "45s"
    method       = "GET"
    path         = "/api/health"

[[vm]]
  size   = "shared-cpu-1x"
  memory = "512mb"
